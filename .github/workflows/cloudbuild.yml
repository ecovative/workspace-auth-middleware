# yamllint disable rule:line-length
---
name: Build Wheel

on:  # yamllint disable-line rule:truthy
  push:
    branches:
      - '*'
    tags:
      - '*'
  schedule:
    - cron: '0 8 1,15 * *'
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install --with dev

      - name: Run PyTest
        run: |
          poetry run pytest tests/

      - name: Run Ruff
        run: |
          poetry run ruff check workspace_auth_middleware

      - name: Run MyPy
        run: |
          poetry run mypy workspace_auth_middleware

  build_package:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Add Poetry to PATH
        run: echo "${HOME}/.local/bin" >> $GITHUB_PATH

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install

      - name: Build the project
        run: |
          bash build_wheels.sh

      - name: Upload Python Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/

  upload_package:
    needs: build_package
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts
          path: dist/

      - name: Move latest tag to current release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete the latest tag locally if it exists
          git tag -d latest || true

          # Delete the latest tag remotely if it exists
          git push origin :refs/tags/latest || true

          # Create a new latest tag pointing to the current commit
          git tag latest

          # Push the latest tag to remote
          git push origin latest

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Deployment Branch
        uses: s0/git-publish-subdir-action@v2.6.0
        env:
          REPO: self
          BRANCH: deployment
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy_pacakge:
    needs: build_package
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: build-artifacts
          path: dist/

      - name: Authenticate with Google Cloud (${{ matrix.deployment.name }})
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets[GCP_CREDENTIALS] }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Upload to GCP
        run: |
          poetry config http-basic.data-systems-artifact-repository oauth2accesstoken "$(gcloud auth print-access-token)"

          poetry poetry publish -r data-systems-artifact-repository --skip-existing
